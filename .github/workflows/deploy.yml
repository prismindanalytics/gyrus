name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'install.sh'
      - 'uninstall.sh'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - name: Copy scripts to docs
        run: |
          cp install.sh docs/install
          cp uninstall.sh docs/uninstall
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs --project-name gyrus
