name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest test_gyrus -v

  version-lockstep:
    # Keep the executable and package metadata aligned so self-update and
    # package installs identify the same release.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: ingest.py __version__ matches pyproject version
        run: |
          IV=$(grep -m1 '^__version__' ingest.py | sed 's/.*"\(.*\)".*/\1/')
          PV=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "ingest.py=$IV pyproject=$PV"
          test "$IV" = "$PV"
      - name: Changes to ingest.py must bump __version__
        if: github.event_name == 'pull_request'
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1 || true
          if git diff --name-only "$base"...HEAD | grep -qx 'ingest.py'; then
            git diff "$base"...HEAD -- ingest.py | grep -q '^+__version__' || {
              echo "ingest.py changed without bumping __version__"
              exit 1
            }
          fi

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install build
          python -m build
      - name: Install wheel
        run: python -m pip install --no-deps dist/*.whl
      - name: Smoke-test installed artifact
        working-directory: ${{ runner.temp }}
        run: |
          python -c "import importlib.metadata as m; import ingest, storage, storage_notion, eval_prompts; assert m.version('gyrus') == ingest.__version__"
          python -m pip check
          gyrus --version
